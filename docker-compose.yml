version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: carbuyingapp
      DB_PASSWORD: carbuyingapp
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/carbuyingdb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: carbuyingdb
      POSTGRES_USER: carbuyingapp
      POSTGRES_PASSWORD: carbuyingapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbuyingapp -d carbuyingdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
